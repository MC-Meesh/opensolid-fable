<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenSolid Playground</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #14171c;
      --panel: #1c2129;
      --border: #2b323d;
      --text: #d7dde6;
      --muted: #8a94a3;
      --accent: #4f9cf9;
      --error: #ff7b72;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      grid-template-columns: minmax(340px, 30%) 1fr;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    #left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--panel);
      min-width: 0;
    }
    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 15px; margin: 0; font-weight: 600; }
    header p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
    #editor {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 12px 14px;
      background: var(--panel);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.5;
      tab-size: 2;
      white-space: pre;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    button {
      background: var(--accent);
      color: #0b1220;
      border: none;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 500;
    }
    #error {
      display: none;
      margin: 0;
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      color: var(--error);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      max-height: 30%;
      overflow: auto;
    }
    #right { position: relative; min-width: 0; }
    #viewport { position: absolute; inset: 0; }
    #viewport canvas { display: block; }
    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 12px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12.5px;
      flex-wrap: wrap;
    }
    #toolbar label { display: flex; align-items: center; gap: 6px; }
    #toolbar input[type="range"] { width: 110px; accent-color: var(--accent); }
    #stats {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      color: var(--muted);
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>
</head>
<body>
  <div id="left">
    <header>
      <h1>OpenSolid Playground</h1>
      <p>Write a script that returns a Shape, then Run (Ctrl/Cmd+Enter).</p>
    </header>
    <textarea id="editor" spellcheck="false"></textarea>
    <pre id="error"></pre>
    <div id="controls">
      <button id="run">Run</button>
      <button id="stl" class="secondary">Download STL</button>
    </div>
  </div>
  <div id="right">
    <div id="viewport"></div>
    <div id="toolbar">
      <label>
        Resolution
        <input id="resolution" type="range" min="32" max="128" step="8" value="64" />
        <span id="resolution-value">64</span>
      </label>
      <label><input id="wireframe" type="checkbox" /> Wireframe</label>
    </div>
    <div id="stats"></div>
    <div id="loading">Loading WASM…</div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
